<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User login</title>
    <style>
        table,th,td{
            border-radius: 10px;
            border-color: rgb(10, 115, 115);
            backdrop-filter: blur(80px);
        }
    </style>
</head>
<body>
    <h1 align="center">User Login</h1>
   
        <table width="200" align="center" backdrop-filter:blur>
            <form>
            <tr>
                <td style="border-top-left-radius: 9px;"><label for="uname">Username:</label></td>
                <td style="border-top-right-radius: 9px;"><input type="text" id="uname" name="uname" placeholder="Username"></td>
            </tr>
            <tr>  <td style="border-bottom-left-radius: 9px;"><label for="pass">Password:</label></td>
                <td style="border-bottom-right-radius: 9px;"><input type="text" name="pass" id="pass" placeholder="Enter your password"></td>
            </tr>
            <tr>
                <td colspan="2" align="center"><input type="button" value="login" onclick="alert('login succesful')"></td>
            </tr>
            </form>
        
        </table>

    
    
    
</body>
</html>
